  <style>
    /* --- MAIN CAROUSEL --- */
    .carousel-container {
      max-width: 1100px;
      margin: 2rem auto;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      height: 600px;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.6s ease;
    }

    .carousel-track img {
  width: 100%;
  height: 600px;
  object-fit: contain; /* show full image */
  background: #000;    /* clean backdrop for portrait photos */
  flex-shrink: 0;
  cursor: pointer;
}

    /* --- THUMBNAILS --- */
    .thumbs-container {
      max-width: 1100px;
      margin: 1.5rem auto 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }

    .thumbs-container img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: var(--radius);
      cursor: pointer;
      transition: 0.3s ease;
    }

    /* Hover Zoom + Shadow (Option C) */
    .thumbs-container img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    /* --- LIGHTBOX --- */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s ease;
      z-index: 9999;
    }

    .lightbox.active {
      visibility: visible;
      opacity: 1;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: var(--radius);
    }

    /* Lightbox navigation arrows */
    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 3rem;
      color: white;
      cursor: pointer;
      padding: 1rem;
      user-select: none;
    }

    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }

  </style>
</head>

  <img id="lightboxImg">
  <span class="lightbox-arrow arrow-right" id="lightboxNext">&#10095;</span>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const track = document.getElementById("carouselTrack");
  const thumbsContainer = document.getElementById("thumbsContainer");
  const images = track.querySelectorAll("img");
  let currentSlide = 0;

  /* Generate thumbnails */
  images.forEach((img, index) => {
    const thumb = document.createElement("img");
    thumb.src = img.src;
    thumb.addEventListener("click", () => {
  goToSlide(index);

  // Smooth scroll to the carousel
  document.querySelector(".carousel-container").scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
});
    thumbsContainer.appendChild(thumb);
  });

  /* Carousel movement */
  function goToSlide(slide) {
    currentSlide = slide;
    track.style.transform = `translateX(-${slide * 100}%)`;
  }

  /* Auto-slide */
  setInterval(() => {
    currentSlide = (currentSlide + 1) % images.length;
    goToSlide(currentSlide);
  }, 4000);

  /* Lightbox */
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");

  images.forEach((img, index) => {
    img.addEventListener("click", () => openLightbox(index));
  });

  function openLightbox(index) {
    currentSlide = index;
    lightboxImg.src = images[index].src;
    lightbox.classList.add("active");
  }

  function closeLightbox() {
    lightbox.classList.remove("active");
  }

  lightbox.addEventListener("click", closeLightbox);

  /* Lightbox navigation */
  document.getElementById("lightboxPrev").addEventListener("click", (e) => {
    e.stopPropagation();
    currentSlide = (currentSlide - 1 + images.length) % images.length;
    lightboxImg.src = images[currentSlide].src;
  });

  document.getElementById("lightboxNext").addEventListener("click", (e) => {
    e.stopPropagation();
    currentSlide = (currentSlide + 1) % images.length;
    lightboxImg.src = images[currentSlide].src;
  });
</script>
